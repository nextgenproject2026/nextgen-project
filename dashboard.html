<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — NextGen</title>
  <link href="https://fonts.googleapis.com/css2?family=Satoshi:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --bg-2: #111111; --bg-3: #1a1a1a;
      --white: #ffffff; --gray-1: #e8e8e8; --gray-2: #a0a0a0; --gray-3: #444444;
      --border: rgba(255,255,255,0.1); --font: 'Satoshi', sans-serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--white); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    /* NAV */
    nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 48px; border-bottom: 1px solid var(--border); }
    .nav-logo svg { width: 100px; }
    .nav-logo svg polygon, .nav-logo svg path { fill: var(--white); }
    .nav-right { display: flex; align-items: center; gap: 24px; }
    .nav-user { font-size: 14px; color: var(--gray-2); }
    .btn-logout { font-family: var(--font); font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; background: transparent; color: var(--gray-2); border: 1px solid var(--border); padding: 8px 16px; border-radius: 4px; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
    .btn-logout:hover { color: var(--white); border-color: rgba(255,255,255,0.3); }

    /* CONTENT */
    .main { max-width: 900px; margin: 0 auto; padding: 60px 48px; }
    .page-title { font-size: 36px; font-weight: 900; letter-spacing: -0.025em; margin-bottom: 8px; }
    .page-sub { font-size: 15px; color: var(--gray-2); margin-bottom: 48px; }

    /* SUCCESS BANNER */
    .banner-success { background: rgba(50,200,100,0.1); border: 1px solid rgba(50,200,100,0.25); border-radius: 4px; padding: 16px 20px; margin-bottom: 32px; font-size: 14px; color: #4ade80; display: none; }
    .banner-success.show { display: block; }

    /* SECTION */
    .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gray-3); margin-bottom: 20px; }

    /* TICKET CARDS */
    .tickets-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 60px; }
    .ticket-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: 4px; padding: 24px 28px; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .ticket-card.confirmed { border-color: rgba(255,255,255,0.2); }
    .ticket-info h3 { font-size: 18px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 6px; }
    .ticket-meta { font-size: 13px; color: var(--gray-2); display: flex; gap: 16px; flex-wrap: wrap; }
    .ticket-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
    .badge { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 10px; border-radius: 2px; }
    .badge.confirmed { background: rgba(50,200,100,0.15); color: #4ade80; }
    .badge.pending { background: rgba(250,180,50,0.15); color: #fbbf24; }
    .badge.cancelled { background: rgba(220,50,50,0.15); color: #ff6b6b; }
    .badge.early-bird { background: rgba(255,255,255,0.1); color: var(--gray-1); }
    .badge.standard { background: rgba(255,255,255,0.05); color: var(--gray-2); }
    .ticket-price { font-size: 16px; font-weight: 700; }
    .ticket-qr { font-size: 11px; color: var(--gray-3); font-family: monospace; }

    /* EMPTY STATE */
    .empty { text-align: center; padding: 60px 24px; border: 1px dashed var(--border); border-radius: 4px; margin-bottom: 60px; }
    .empty p { font-size: 15px; color: var(--gray-2); margin-bottom: 20px; }
    .btn-primary { font-family: var(--font); font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; background: var(--white); color: var(--bg); border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.85; }

    /* PROFILE */
    .profile-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: 4px; padding: 28px; max-width: 480px; }
    .profile-field { margin-bottom: 20px; }
    .profile-field:last-child { margin-bottom: 0; }
    label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-3); display: block; margin-bottom: 6px; }
    input { font-family: var(--font); font-size: 15px; width: 100%; background: var(--bg-3); border: 1px solid var(--border); color: var(--white); padding: 10px 14px; border-radius: 4px; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: rgba(255,255,255,0.3); }
    .btn-save { font-family: var(--font); font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; background: var(--white); color: var(--bg); border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-top: 20px; transition: opacity 0.2s; }
    .btn-save:hover { opacity: 0.85; }
    .save-msg { font-size: 13px; color: #4ade80; margin-top: 10px; display: none; }

    @media (max-width: 600px) {
      nav { padding: 16px 20px; }
      .main { padding: 40px 20px; }
      .ticket-card { flex-direction: column; align-items: flex-start; }
      .ticket-right { align-items: flex-start; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">
      <svg viewBox="0 0 629.36 216.06" xmlns="http://www.w3.org/2000/svg">
        <polygon points="526.76 203.06 527.86 201.96 527.86 131.95 582.65 202.02 583.69 203.06 600.13 203.06 601.17 202.02 601.17 101.52 600.07 100.42 584.68 100.42 583.58 101.52 583.58 171.53 527.63 101.51 526.53 100.42 511.37 100.42 510.27 101.52 510.27 202.02 511.31 203.06 526.76 203.06"/>
        <polygon points="210.94 115.99 251.12 64.16 212.05 13 233.95 13 262.17 49.9 290.76 13 312.69 13 273.32 64.5 312.68 115.99 290.76 115.99 262.37 78.84 233.97 115.99 210.94 115.99"/>
        <polygon points="498.96 186.23 484.97 203.05 429.99 203.05 428.89 201.95 428.89 101.16 429.99 100.06 493.77 100.06 494.87 101.16 494.87 117.28 493.77 118.38 447.22 118.38 447.22 142.94 484.24 142.94 485.34 144.04 485.34 160.17 484.24 161.27 447.22 161.27 447.22 184.73 498.17 184.73 498.96 186.23"/>
        <path d="M369.15,57.72v-26.2h33.36l-15.03-18.33h-64.51l-1.1,1.1v16.13l1.1,1.1h27.49v68.18c-21.85,4.27-37.9,23.65-40.32,45.45H14.66V0H0v159.07h310.86c10.92,71.81,113.25,53.99,103.37-16.86h-36.29l-12.1,18.33h29.32c-6.78,27.96-40.54,38.19-59.25,14.17-27.88-35.78,20.13-81.84,52.91-47.22l10.45-13.09c-6.83-9.84-19.12-13.28-30.14-15.93v-26.82h245.56v144.42h14.66V57.72h-260.22Z"/>
        <polygon points="205.79 99.18 191.8 116 136.82 116 135.72 114.9 135.72 14.11 136.82 13.01 200.6 13.01 201.7 14.11 201.7 30.23 200.6 31.33 154.05 31.33 154.05 55.89 191.07 55.89 192.17 56.99 192.17 73.12 191.07 74.22 154.05 74.22 154.05 97.68 205 97.68 205.79 99.18"/>
        <polygon points="44.75 116 45.85 114.89 45.85 44.64 100.83 114.95 101.87 116 118.37 116 120.41 114.95 120.41 14.11 118.31 13.01 102.86 13.01 101.76 14.11 101.76 84.36 45.62 14.1 44.51 13.01 29.3 13.01 28.19 14.11 28.19 114.95 29.24 116 44.75 116"/>
      </svg>
    </a>
    <div class="nav-right">
      <span class="nav-user" id="user-email"></span>
      <button class="btn-logout" onclick="handleLogout()">Esci</button>
    </div>
  </nav>

  <main class="main">
    <div class="banner-success" id="success-banner"></div>

    <h1 class="page-title">La tua area</h1>
    <p class="page-sub">Gestisci i tuoi biglietti e il profilo.</p>

    <!-- BIGLIETTI -->
    <div class="section-label">I tuoi biglietti</div>
    <div class="tickets-grid" id="tickets-container">
      <div style="color: var(--gray-2); font-size: 14px; padding: 20px 0;">Caricamento...</div>
    </div>

    <!-- PROFILO -->
    <div class="section-label">Profilo</div>
    <div class="profile-card">
      <div class="profile-field">
        <label>Nome completo</label>
        <input type="text" id="profile-name" placeholder="Il tuo nome" />
      </div>
      <div class="profile-field">
        <label>Email</label>
        <input type="email" id="profile-email" disabled style="opacity:0.5;cursor:not-allowed;" />
      </div>
      <button class="btn-save" onclick="saveProfile()">Salva modifiche</button>
      <div class="save-msg" id="save-msg">Profilo aggiornato.</div>
    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://gafmqwiympfzervppqvi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhZm1xd2l5bXBmemVydnBwcXZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTQ1NTIsImV4cCI6MjA5MTk5MDU1Mn0.7xDiXBLf_Zf85hNP0Zq1nQXsX0Vz7dRkE8XROafRpII';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) return window.location.href = 'login.html';
      currentUser = session.user;

      document.getElementById('user-email').textContent = currentUser.email;
      document.getElementById('profile-email').value = currentUser.email;

      // Mostra banner successo se redirect da Stripe
      const params = new URLSearchParams(window.location.search);
      if (params.get('success')) {
        const banner = document.getElementById('success-banner');
        const eventName = params.get('event') ? decodeURIComponent(params.get('event')) : 'l\'evento';
        banner.textContent = `Pagamento confermato! Il tuo biglietto per ${eventName} è stato registrato.`;
        banner.classList.add('show');
        window.history.replaceState({}, '', '/dashboard.html');
      }

      await loadProfile();
      await loadTickets();
    }

    async function loadProfile() {
      const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
      if (data?.full_name) document.getElementById('profile-name').value = data.full_name;
    }

    async function loadTickets() {
      const { data: tickets, error } = await sb
        .from('tickets')
        .select(`*, events(title, event_date, location)`)
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false });

      const container = document.getElementById('tickets-container');

      if (error || !tickets || tickets.length === 0) {
        container.innerHTML = `
          <div class="empty">
            <p>Non hai ancora nessun biglietto.</p>
            <a href="index.html#events" class="btn-primary">Scopri gli eventi</a>
          </div>`;
        return;
      }

      container.innerHTML = tickets.map(t => {
        const event = t.events;
        const date = event ? new Date(event.event_date).toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—';
        const price = (t.price_paid / 100).toLocaleString('it-IT', { style: 'currency', currency: 'EUR' });
        return `
          <div class="ticket-card ${t.status}">
            <div class="ticket-info">
              <h3>${event?.title || 'Evento'}</h3>
              <div class="ticket-meta">
                <span>${date}</span>
                <span>${event?.location || ''}</span>
              </div>
            </div>
            <div class="ticket-right">
              <span class="badge ${t.status}">${t.status === 'confirmed' ? 'Confermato' : t.status === 'pending' ? 'In attesa' : 'Annullato'}</span>
              <span class="badge ${t.ticket_type === 'early_bird' ? 'early-bird' : 'standard'}">${t.ticket_type === 'early_bird' ? 'Early Bird' : 'Standard'}</span>
              <span class="ticket-price">${price}</span>
              <span class="ticket-qr">#${t.qr_code?.slice(0, 8).toUpperCase()}</span>
            </div>
          </div>`;
      }).join('');
    }

    async function saveProfile() {
      const name = document.getElementById('profile-name').value;
      const { error } = await sb.from('profiles').update({ full_name: name }).eq('id', currentUser.id);
      const msg = document.getElementById('save-msg');
      msg.style.display = error ? 'none' : 'block';
      if (!error) setTimeout(() => msg.style.display = 'none', 3000);
    }

    async function handleLogout() {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    }

    init();
  </script>
</body>
</html>
