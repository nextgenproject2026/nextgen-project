<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrazione confermata — NextGen</title>
  <link href="https://fonts.googleapis.com/css2?family=Satoshi:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --bg-2: #111111;
      --white: #ffffff; --gray-2: #a0a0a0; --gray-3: #444444;
      --border: rgba(255,255,255,0.1); --font: 'Satoshi', sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }
    .logo { margin-bottom: 56px; }
    .logo svg { width: 120px; }
    .logo svg polygon, .logo svg path { fill: var(--white); }

    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1px solid rgba(50,200,100,0.3);
      background: rgba(50,200,100,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }
    .icon svg { width: 28px; height: 28px; }

    h1 {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -0.025em;
      margin-bottom: 16px;
    }
    p {
      font-size: 16px;
      color: var(--gray-2);
      line-height: 1.7;
      margin-bottom: 48px;
    }
    .btn-primary {
      font-family: var(--font);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--white);
      color: var(--bg);
      border: none;
      padding: 14px 32px;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: opacity 0.2s;
      margin-right: 12px;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary {
      font-family: var(--font);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: transparent;
      color: var(--white);
      border: 1px solid var(--border);
      padding: 14px 32px;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: border-color 0.2s;
    }
    .btn-secondary:hover { border-color: rgba(255,255,255,0.3); }

    .countdown {
      margin-top: 32px;
      font-size: 13px;
      color: var(--gray-3);
    }
    .countdown span { color: var(--gray-2); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">

    <div class="icon">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 14L11 20L23 8" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>

    <h1>Sei dentro.</h1>
    <p>
      Il tuo account NextGen è stato confermato.<br>
      Ora puoi accedere, comprare i biglietti e far parte della community.
    </p>

    <a href="area.html" class="btn-primary" id="btn-next">Vai alla tua area</a>
    

    <div class="countdown">Redirect automatico tra <span id="count">5</span> secondi...</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://gafmqwiympfzervppqvi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhZm1xd2l5bXBmemVydnBwcXZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTQ1NTIsImV4cCI6MjA5MTk5MDU1Mn0.7xDiXBLf_Zf85hNP0Zq1nQXsX0Vz7dRkE8XROafRpII';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function verifyToken() {
      const params = new URLSearchParams(window.location.search);
      const token_hash = params.get('token_hash');
      const type = params.get('type');
      const next = params.get('next') || '/area.html';

      if (token_hash && type) {
        const { error } = await sb.auth.verifyOtp({ token_hash, type });
        if (!error) {
          startCountdown(next);
          return;
        }
      }

      // Fallback: controlla se già loggato
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        startCountdown(next);
      }
    }

    let count = 5;
    function startCountdown(next) {
      const el = document.getElementById('count');
      const interval = setInterval(() => {
        count--;
        el.textContent = count;
        if (count <= 0) {
          clearInterval(interval);
          window.location.href = next;
        }
      }, 1000);
    }

    verifyToken();
  </script>
</body>
</html>
